services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fitness_tracker
      POSTGRES_PASSWORD: fitness_tracker
      POSTGRES_DB: fitness_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitness_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DB_USER: fitness_tracker
      DB_HOST: db
      DB_NAME: fitness_tracker
      DB_PASSWORD: fitness_tracker
      DB_PORT: 5432
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:3001
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
