databases:
  - name: fittrack-db
    databaseName: fitness_tracker
    user: fitness_tracker
    plan: free

services:
  - type: web
    name: fittrack-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DB_USER
        fromDatabase:
          name: fittrack-db
          property: user
      - key: DB_HOST
        fromDatabase:
          name: fittrack-db
          property: host
      - key: DB_NAME
        fromDatabase:
          name: fittrack-db
          property: database
      - key: DB_PASSWORD
        fromDatabase:
          name: fittrack-db
          property: password
      - key: DB_PORT
        fromDatabase:
          name: fittrack-db
          property: port

  - type: web
    name: fittrack-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        value: https://fittrack-backend.onrender.com
